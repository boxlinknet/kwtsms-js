version: 2
updates:
  # Keep npm devDependencies up to date (grouped into one PR)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      dev-dependencies:
        patterns:
          - "*"

  # Keep GitHub Actions pinned versions up to date (grouped into one PR)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      actions:
        patterns:
          - "*"
